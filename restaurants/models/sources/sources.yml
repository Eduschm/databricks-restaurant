version: 2

sources:
  - name: landing
    description: "Raw data landed from Azure SQL via Lakehouse Federation and Event Hubs"
    database: restaurantsworkspace
    schema: landing
    config:
      tags: ["bronze", "raw"]

    tables:
      - name: customers
        description: "Customer master data from Azure SQL via batch Federation"
        columns:
          - name: customer_id
            description: "Primary key"
            tests:
              - not_null

      - name: restaurants
        description: "Restaurant master data from Azure SQL via batch Federation"
        columns:
          - name: restaurant_id
            tests:
              - not_null

      - name: menu_items
        description: "Menu items per restaurant from Azure SQL"
        columns:
          - name: item_id
            tests:
              - not_null
          - name: restaurant_id
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('landing', 'restaurants')
                    field: restaurant_id

      - name: reviews
        description: "Customer reviews from Azure SQL"
        columns:
          - name: restaurant_id
            tests:
              - not_null
            
      - name: historical_orders
        description: "One-time historical orders load from Azure SQL"
        columns:
          - name: restaurant_id
            tests:
              - not_null

      - name: orders
        description: "Orders stream from Azure SQL via Event Hubs"
        columns:
          - name: restaurant_id
            tests:
              - not_null

  